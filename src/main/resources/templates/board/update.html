<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>독서로그 - 독후감 수정</title>
	<link rel="stylesheet" th:href="@{/css/update.css}">
</head>

<body>
	<nav class="nav">
		<span><a th:href="@{/main}" class="nav-logo">독서로그</a></span>
		<div class="nav-menu">
			<button type="button" th:onclick="|location.href='@{/board/list}'|" class="write-form">목록</button>
			<button type="button" th:onclick="|location.href='@{/member/logout}'|" class="login-form">로그아웃</button>
		</div>
	</nav>

	<main>
		<div class="container-sm">
			<h2>독후감 수정</h2>
			<p>다시 한번 읽은 책에 대한 감상을 기록하세요</p>
			<br>
			<br>

			<form th:action="@{/board/update/{id}(id=${board.boardId})}" method="post">
				<div class="form-group">
					<label for="boardTitle">제목</label>
					<input type="text" id="boardTitle" name="boardTitle" th:value="${board.boardTitle}" required>
				</div>

				<div class="form-group">
					<label for="boardAuthor">저자</label>
					<input type="text" id="boardAuthor" name="boardAuthor" th:value="${board.boardAuthor}" required>
				</div>

				<div class="form-group">
					<label for="boardPublisher">출판사</label>
					<input type="text" id="boardPublisher" name="boardPublisher" th:value="${board.boardPublisher}" required>
				</div>

				<div class="form-group">
					<label for="boardContent">독후감</label>
					<textarea id="boardContent" name="boardContent" th:text="${board.boardContent}" required></textarea>
				</div>

				<button type="submit" class="btn-btn-primary">수정하기</button>
			</form>
		</div>
	</main>

	<footer>
		<div class="sub">
			<div class="sub-sub1">
				<p class="sub-title">독서LOG</p>
				<br>
				<p class="sub-sub">읽고, 기록하고, 성장하세요.</p>
			</div>

			<div class="sub-category">
				<div class="small-title">계정</div>
				<br>
				<a th:href="@{/member/logout}">로그아웃</a>
			</div>
		</div>
	</footer>
</body>

</html>
