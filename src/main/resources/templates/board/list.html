<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>독서로그 - 게시글 목록</title>
	<link rel="stylesheet" th:href="@{/css/list.css}">
</head>

<body>
	<nav class="nav">
		<span><a th:href="@{/main}" class="nav-logo">독서로그</a></span>
		<div class="nav-right">
			<span th:if="${session.loginMember != null}">
				<span class="nav-user" th:text="${session.loginMember.memberLoginId}">회원</span> 님 환영합니다
			</span>
			<button th:if="${session.loginMember == null}" class="nav-btn" th:onclick="|location.href='@{/member/login}'|" type="button">로그인</button>
			<button th:if="${session.loginMember != null}" class="nav-btn" th:onclick="|location.href='@{/member/logout}'|" type="button">로그아웃</button>
			<button class="nav-write" th:onclick="|location.href='@{/board/write}'|" type="button">게시글 쓰기</button>
		</div>
	</nav>

	<main>
		<div class="container">
			<form class="search-row" th:action="@{/board/list}" method="get">
				<input class="search" type="text" id="search" name="keyword" placeholder="제목, 저자, 출판사, 내용 또는 작성자 검색" th:value="${keyword}">
				<button class="search-btn" type="submit">검색</button>
			</form>

			<p class="search-keyword" th:if="${keyword != null and keyword != ''}">
				'<strong th:text="${keyword}"></strong>' 검색 결과
			</p>

			<table>
				<thead>
					<tr>
						<th style="width:70px">번호</th>
						<th>제목</th>
						<th style="width:100px">작성자</th>
						<th style="width:120px">날짜</th>
						<th style="width:70px">조회수</th>
					</tr>
				</thead>
				<tbody id="board-body">
					<tr th:if="${#lists.isEmpty(boardList)}">
						<td colspan="5" class="no-data">등록된 게시글이 없습니다.</td>
					</tr>

					<tr th:each="board : ${boardList}">
						<td th:text="${board.boardId}">1</td>
						<td>
							<a th:href="@{/board/detail/{id}(id=${board.boardId})}" th:text="${board.boardTitle}"
							style="color:black">게시글 제목</a>
						</td>
						<td th:text="${board.memberLoginId}">작성자</td>
						<td th:text="${board.boardRegDate}">날짜</td>
						<td th:text="${board.boardViews}">0</td>
					</tr>
				</tbody>
			</table>

			<div class="pagination" th:if="${totalPages > 0}">
				<a th:if="${currentPage > 1}" th:href="@{/board/list(page=${currentPage - 1}, keyword=${keyword})}">이전</a>
				<a th:each="i : ${#numbers.sequence(1, totalPages)}"
				   th:href="@{/board/list(page=${i}, keyword=${keyword})}"
				   th:text="${i}"
				   th:classappend="${i == currentPage} ? ' active' : ''">1</a>
				<a th:if="${currentPage < totalPages}" th:href="@{/board/list(page=${currentPage + 1}, keyword=${keyword})}">다음</a>
			</div>
		</div>
	</main>

	<footer>
		<div class="sub">
			<div class="sub-sub1">
				<p class="sub-title">독서LOG</p>
				<br>
				<p class="sub-sub">읽고, 기록하고, 성장하세요.</p>
			</div>

			<div class="sub-category">
				<div class="small-title">계정</div>
				<br>
				<a th:if="${session.loginMember == null}" th:href="@{/member/login}">로그인</a>
				<a th:if="${session.loginMember == null}" th:href="@{/member/join}">회원가입</a>
				<a th:if="${session.loginMember != null}" th:href="@{/member/logout}">로그아웃</a>
			</div>
		</div>
	</footer>
</body>

</html>
