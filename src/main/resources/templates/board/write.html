<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>독서로그 - 독후감 작성</title>
	<link rel="stylesheet" th:href="@{/css/write.css}">
</head>

<body>
	<nav class="nav">
		<span><a th:href="@{/main}" class="nav-logo">독서로그</a></span>
		<div class="nav-menu">
			<button type="button" th:onclick="|location.href='@{/board/list}'|" class="write-form">목록</button>
			<button th:if="${session.loginMember == null}" type="button" th:onclick="|location.href='@{/member/login}'|" class="login-form">로그인</button>
			<button th:if="${session.loginMember == null}" type="button" th:onclick="|location.href='@{/member/join}'|" class="join-form">회원가입</button>
			<button th:if="${session.loginMember != null}" type="button" th:onclick="|location.href='@{/member/logout}'|" class="login-form">로그아웃</button>
		</div>
	</nav>

	<main>
		<div class="container-sm">
			<h2>독후감 작성</h2>
			<p>읽은 책에 대한 감상을 기록하세요</p>
			<br>
			<br>

			<form th:action="@{/board/write}" method="post">
				<div class="form-group">
					<label for="boardTitle">제목</label>
					<input type="text" id="boardTitle" name="boardTitle" placeholder="독후감 제목을 입력하세요" required>
				</div>

				<div class="form-group">
					<label for="boardAuthor">저자</label>
					<input type="text" id="boardAuthor" name="boardAuthor" placeholder="저자명을 입력하세요" required>
				</div>

				<div class="form-group">
					<label for="boardPublisher">출판사</label>
					<input type="text" id="boardPublisher" name="boardPublisher" placeholder="출판사명을 입력하세요" required>
				</div>

				<div class="form-group">
					<label for="boardContent">독후감</label>
					<textarea id="boardContent" name="boardContent" placeholder="책을 읽고 느낀 점을 자유롭게 서술하세요" required></textarea>
				</div>

				<button type="submit" class="btn-btn-primary">등록하기</button>
			</form>
		</div>
	</main>

	<footer>
		<div class="sub">
			<div class="sub-sub1">
				<p class="sub-title">독서LOG</p>
				<br>
				<p class="sub-sub">읽고, 기록하고, 성장하세요.</p>
			</div>

			<div class="sub-category">
				<div class="small-title">계정</div>
				<br>
				<a th:if="${session.loginMember == null}" th:href="@{/member/login}">로그인</a>
				<a th:if="${session.loginMember == null}" th:href="@{/member/join}">회원가입</a>
				<a th:if="${session.loginMember != null}" th:href="@{/member/logout}">로그아웃</a>
			</div>
		</div>
	</footer>
</body>

</html>
