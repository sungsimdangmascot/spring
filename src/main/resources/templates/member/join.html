<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>회원가입</title>
	<link rel="stylesheet" th:href="@{/css/join.css}">
</head>

<body>
	<nav class="nav">
		<span><a th:href="@{/main}" class="nav-logo">독서로그</a></span>
		<div class="nav-menu">
			<button type="button" th:onclick="|location.href='@{/board/write}'|" class="write-form">독후감 작성</button>
			<button type="button" th:onclick="|location.href='@{/member/login}'|" class="login-form">로그인</button>
		</div>
	</nav>

	<main>
		<div class="container-sm">
			<h2>회원가입</h2>
			<div class="error-msg" th:if="${error == 'duplicate'}">
				이미 사용 중인 아이디입니다. 다른 아이디를 입력해 주세요.
			</div>

			<form th:action="@{/member/join}" method="post">
				<div class="form-group">
					<label for="memberLoginId">아이디</label>
					<input type="text" id="memberLoginId" name="memberLoginId" placeholder="아이디를 입력하세요" required>
				</div>

				<div class="form-group">
					<label for="memberName">이름</label>
					<input type="text" id="memberName" name="memberName" placeholder="이름을 입력하세요" required>
				</div>

				<div class="form-group">
					<label for="memberEmail">이메일</label>
					<input type="email" id="memberEmail" name="memberEmail" placeholder="이메일을 입력하세요" required>
				</div>

				<div class="form-group">
					<label for="memberPw">비밀번호</label>
					<input type="password" id="memberPw" name="memberPw" placeholder="비밀번호를 입력하세요" required>
				</div>

				<div class="form-group">
					<label for="memberTel">전화번호</label>
					<input type="text" id="memberTel" name="memberTel" placeholder="010-0000-0000">
					<p class="hint">선택 항목입니다.</p>
				</div>

				<div class="form-footer">
					<button type="button" class="btn-btn-secondary" th:onclick="|location.href='@{/member/login}'|">로그인으로 이동</button>
					<button type="submit" class="btn-btn-primary">가입하기</button>
				</div>
			</form>
		</div>
	</main>

	<footer>
		<div class="sub">
			<div class="sub-sub1">
				<p class="sub-title">독서LOG</p>
				<br>
				<p class="sub-sub">읽고, 기록하고, 성장하세요.</p>
			</div>

			<div class="sub-category">
				<div class="small-title">계정</div>
				<br>
				<a th:href="@{/member/login}">로그인</a>
			</div>
		</div>
	</footer>
</body>

</html>
