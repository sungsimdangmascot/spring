<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <!-- <link rel="stylesheet" href="common.css"> -->
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<nav class="nav">
        <span><a href="./main.html" class="nav-logo">독서로그</a></span>
        <div class="nav-menu">
          <button class="write-form" type="button" onclick="location.href='write.html' ">독후감 작성</button>
          <button class="join-form" type="submit" onclick="location.href='join.html' ">회원가입</button>
        </div>
      </nav>
<main>
<div class="container-sm">
    <h2>로그인</h2>
    <!-- <div class="error-msg">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div> -->
    <form th:action="@{/member/login}" method="post">

        <div class="form-group">
            <label for="loginId">아이디</label>
            <input type="text"
                   id="loginId"
                   name="loginId"
                   placeholder="아이디를 입력하세요"
                   required>
        </div>

        <div class="form-group">
            <label for="pw">비밀번호</label>
            <input type="password"
                   id="pw"
                   name="pw"
                   placeholder="비밀번호를 입력하세요"
                   required>
        </div>

        <div class="form-footer">
            <a href="" class="btn btn-secondary">회원가입</a>
            <button type="submit" class="btn-btn-primary" onclick="location.href='login.html' ">로그인</button>
        </div>

    </form>
</div>
</main>
<footer>
      <div class="sub">
        <div class="sub-sub1">
          <p class="sub-title">독서LOG</p>
          <br />
          <p class="sub-sub">읽고, 기록하고, 성장하세요.</p>
        </div>

        <div class="sub-category">
          <div class="small-title">계정</div>
          <br>
          <!-- <a href="">로그인</a> -->
          <a href="join.html">회원가입</a>
        </div>
      </div>
    </footer>
    
</body>
</html>
