spring.application.name=booklog


server.port=8870

#-------------------------------------
# 1. mysql DB연결
#-------------------------------------

# DB서버 주소(내 PC = localhost, 포트 3306, DB명 = springdb)
# useSSL=false          : SSL 보안 연결 사용 안 함 (로컬 개발 환경)
# serverTimezone        : 서버 시간대를 한국(Asia/Seoul)으로 지정
# characterEncoding     : 한글이 깨지지 않도록 UTF-8 인코딩 지정
spring.datasource.url=jdbc:mysql://localhost:3306/booklog?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# DB 접속 아이디
spring.datasource.username=root

# DB 접속 비밀번호
spring.datasource.password=1234

# MySQL JDBC 드라이버 연결
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 2. MyBatis 설정
#-------------------------------------------------------------------------

# Mapper xml 파일 위치 : resources/mappers/ 폴더 안의 모든 xml
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DB 컬럼명 (member_id
mybatis.configuration.map-underscore-to-camel-case=true